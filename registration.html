<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Restainance</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2><i class="fas fa-user-plus"></i> Create Account</h2>
            <form>
                <!-- 2-COLUMN SPLIT LAYOUT -->
                <div class="two-columns">
                    <!-- Column 1 -->
                    <div class="field-wrapper">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="fullname" placeholder="Enter your name">
                    </div>

                    <div class="field-wrapper">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="your@email.com">
                    </div>

                    <div class="field-wrapper">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-box">
                            <input type="password" id="password" placeholder="Create password">
                            <span class="toggle-password">
                                <i class="far fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>

                    <div class="field-wrapper">
                        <label><i class="fas fa-users"></i> Role</label>
                        <select id="role">
                            <option value="student"><i class="fas fa-user-graduate"></i> Student</option>
                            <option value="staff"><i class="fas fa-user-tie"></i> Maintenance staff</option>
                            <option value="admin"><i class="fas fa-user-shield"></i> Admin/landlord</option>
                        </select>
                    </div>

                    <!-- Column 2 -->
                    <div class="field-wrapper">
                        <label><i class="fas fa-building"></i> Residence</label>
                        <input type="text" id="residence" placeholder="e.g Block A">
                    </div>

                    <div class="field-wrapper">
                        <label><i class="fas fa-door-open"></i> Room Number</label>
                        <input type="text" id="room" placeholder="e.g 204">
                    </div>

                    <div class="field-wrapper">
                        <label><i class="fas fa-id-card"></i> Student Number</label>
                        <input type="text" id="studentNumber" placeholder="Enter your student number">
                    </div>
                </div>

                <button type="submit"><i class="fas fa-check-circle"></i> Register</button>
                <p>Already have an account? <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a></p>
                <p><a href="index.html"><i class="fas fa-home"></i> Home</a></p>
            </form>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
