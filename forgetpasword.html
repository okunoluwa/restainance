<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Restainance</title>
    <link rel="stylesheet" href="forgot-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="form-box">
        <h2><i class="fas fa-key"></i> Forgot Password</h2>
        <p><i class="fas fa-info-circle"></i> Enter your email to receive a reset link</p>

        <form id="forgotForm">

            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" placeholder="Enter your email" required>

            <button type="submit"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
            <p><a href="reset-password.html"><i class="fas fa-lock"></i> Password reset</a></p>

        </form>

        <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
    </div>

</div>

<script src="forgot-password.js"></script>
</body>
</html>
