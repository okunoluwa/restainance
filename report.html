<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Restainance</title>
    <link rel="stylesheet" href="report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2><i class="fas fa-tools"></i> Restainance</h2>
        <ul>
            <li><a href="student-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="active"><a href="report.html"><i class="fas fa-plus-circle"></i> Report Issue</a></li>
            <li><a href="my-requests.html"><i class="fas fa-list-ul"></i> My Requests</a></li>
            <li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            <li><a href="#" id="darkModeSidebarBtn"><i class="fas fa-moon"></i> Dark Mode</a></li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
        <h1><i class="fas fa-tools"></i> Report Maintenance Issue</h1>

        <form id="reportForm">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Issue Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Broken light, Leaking faucet" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Category</label>
                <select id="category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Plumbing">🔧 Plumbing</option>
                    <option value="Electrical">⚡ Electrical</option>
                    <option value="Furniture">🪑 Furniture</option>
                    <option value="Cleaning">🧹 Cleaning</option>
                    <option value="HVAC">🌬️ HVAC/Air Conditioning</option>
                    <option value="Other">🔨 Other</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-door-open"></i> Room Number</label>
                <input type="text" id="roomNumber" name="roomNumber" placeholder="e.g., 204" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Student Number</label>
                <input type="text" id="studentNumber" name="studentNumber" placeholder="e.g., 202400123" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Please describe the issue in detail..." required></textarea>
            </div>

            <!-- IMAGE UPLOAD SECTION WITH CAMERA OPTION -->
            <div class="form-group">
                <label><i class="fas fa-image"></i> Add Photo Evidence</label>
                
                <div class="image-options">
                    <button type="button" id="uploadBtn" class="image-option-btn">
                        <i class="fas fa-upload"></i> Upload from Gallery
                    </button>
                    <button type="button" id="cameraBtn" class="image-option-btn">
                        <i class="fas fa-camera"></i> Take Photo
                    </button>
                </div>
                
                <input type="file" id="image" name="image" accept="image/*" style="display: none;">
                <input type="file" id="cameraInput" name="camera" accept="image/*" capture="environment" style="display: none;">
                
                <div id="imagePreview" class="image-preview" style="display: none;">
                    <i class="fas fa-image"></i>
                    <span id="imageName"></span>
                    <button type="button" id="removeImage" class="remove-image-btn"><i class="fas fa-times"></i></button>
                </div>
                
                <small><i class="fas fa-info-circle"></i> Max size: 5MB. Supported formats: JPG, PNG, GIF</small>
            </div>

            <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit Request</button>
        </form>
    </main>
</div>

<!-- FOOTER -->
<footer>
    <p><i class="far fa-copyright"></i> 2026 Restainance | Student Residence Maintenance App</p>
</footer>

<script src="report.js"></script>

</body>
</html>
