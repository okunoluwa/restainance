<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue - Restainance</title>
    <link rel="stylesheet" href="report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2><i class="fas fa-tools"></i> Restainance</h2>
        <ul>
            <li><a href="student-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li class="active"><a href="report.html"><i class="fas fa-plus-circle"></i> Report Issue</a></li>
            <li><a href="my-requests.html"><i class="fas fa-list-ul"></i> My Requests</a></li>
            <li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            <li><a href="#" id="darkModeSidebarBtn"><i class="fas fa-moon"></i> Dark Mode</a></li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
        <h1><i class="fas fa-tools"></i> Report Maintenance Issue</h1>

        <form id="reportForm">
            <div class="form-group">
                <label><i class="fas fa-heading"></i> Issue Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Broken light, Leaking faucet" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Category</label>
                <select id="category" name="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Plumbing"><i class="fas fa-tint"></i> Plumbing</option>
                    <option value="Electrical"><i class="fas fa-bolt"></i> Electrical</option>
                    <option value="Furniture"><i class="fas fa-chair"></i> Furniture</option>
                    <option value="Cleaning"><i class="fas fa-broom"></i> Cleaning</option>
                    <option value="HVAC"><i class="fas fa-wind"></i> HVAC/Air Conditioning</option>
                    <option value="Other"><i class="fas fa-wrench"></i> Other</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-door-open"></i> Room Number</label>
                <input type="text" id="roomNumber" name="roomNumber" placeholder="e.g., 204" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Student Number</label>
                <input type="text" id="studentNumber" name="studentNumber" placeholder="e.g., 202400123" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Please describe the issue in detail..." required></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> Upload Image (Optional)</label>
                <input type="file" id="image" name="image" accept="image/*">
                <small><i class="fas fa-info-circle"></i> Max size: 2MB. Supported formats: JPG, PNG, GIF</small>
            </div>

            <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit Request</button>
        </form>
    </main>
</div>

<!-- FOOTER -->
<footer>
    <p><i class="far fa-copyright"></i> 2026 Restainance | Student Residence Maintenance App</p>
</footer>

<script src="report.js"></script>

</body>
</html>
