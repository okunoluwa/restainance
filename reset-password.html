<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Restainance</title>
    <link rel="stylesheet" href="reset-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="form-box">
        <h2><i class="fas fa-sync-alt"></i> Reset Password</h2>
        <p><i class="fas fa-info-circle"></i> Create a new password</p>

        <form id="resetForm">

            <label><i class="fas fa-lock"></i> New Password</label>
            <div class="password-box">
                <input type="password" id="newPassword" required>
                <span onclick="togglePassword('newPassword')"><i class="fas fa-eye"></i></span>
            </div>

            <label><i class="fas fa-lock"></i> Confirm Password</label>
            <div class="password-box">
                <input type="password" id="confirmPassword" required>
                <span onclick="togglePassword('confirmPassword')"><i class="fas fa-eye"></i></span>
            </div>

            <button type="submit"><i class="fas fa-check-circle"></i> Reset Password</button>

        </form>

        <p><a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
    </div>

</div>

<script src="reset-password.js"></script>
</body>
</html>
