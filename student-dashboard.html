<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Restainance</title>
    <link rel="stylesheet" href="student-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2><i class="fas fa-tools"></i> Restainance</h2>

        <ul>
            <li class="active"><a href="student-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="report.html"><i class="fas fa-plus-circle"></i> Report Issue</a></li>
            <li><a href="my-requests.html"><i class="fas fa-list-ul"></i> My Requests</a></li>
            <li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            <li><a href="#" id="darkModeSidebarBtn"><i class="fas fa-moon"></i> Dark Mode</a></li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- TOP HEADER -->
        <div class="top-bar">
            <h1><i class="fas fa-user-graduate"></i> Welcome <span id="studentName">Student</span></h1>
        </div>



        <!-- SEARCH BAR -->
        <div id="searchContainer" style="margin: 15px 0;">
            <input type="text" id="searchInput" placeholder="🔍 Search your requests..." 
            style="width: 100%; padding: 12px; border-radius: 30px; border: 1px solid #ddd; font-size: 16px;">
        </div>
        
        <!-- STATS SECTION -->
        <section class="stats">
            <div class="card">
                <h3><i class="fas fa-clipboard-list"></i> Total Requests</h3>
                <p id="totalCount">0</p>
            </div>

            <div class="card">
                <h3><i class="fas fa-clock"></i> Pending</h3>
                <p id="pendingCount">0</p>
            </div>

            <div class="card">
                <h3><i class="fas fa-check-circle"></i> Completed</h3>
                <p id="completedCount">0</p>
            </div>
        </section>

        <!-- REQUESTS SECTION -->
        <section class="requests">
            <h2><i class="fas fa-history"></i> Recent Requests</h2>
            <div id="requestsList"></div>
        </section>

    </main>

</div>

<!-- FOOTER -->
<footer>
    <p><i class="far fa-copyright"></i> 2026 Restainance | Student Residence Maintenance App</p>
</footer>

<script src="student-dashboard.js"></script>

</body>
</html>
